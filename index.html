<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Films en salle</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

      :root {
        --bg:            #13131a;
        --bg-gradient:
          radial-gradient(ellipse 90% 60% at 20% -5%, rgba(99,102,241,0.15) 0%, transparent 55%),
          radial-gradient(ellipse 60% 40% at 80% 10%, rgba(139,92,246,0.08) 0%, transparent 50%),
          radial-gradient(ellipse 50% 25% at 50% 105%, rgba(224,85,80,0.06) 0%, transparent 60%);
        --surface:       rgba(255,255,255,0.04);
        --surface-solid: #1c1c26;
        --surface-2:     rgba(255,255,255,0.06);
        --border:        rgba(255,255,255,0.08);
        --border-hover:  rgba(255,255,255,0.16);
        --text-1:        #f2f2f8;
        --text-2:        #8888a8;
        --text-3:        #44445a;
        --accent:        #7c86f5;
        --accent-subtle: rgba(124, 134, 245, 0.1);
        --accent-border: rgba(124, 134, 245, 0.3);
        --gold:          #e0b040;
        --gold-subtle:   rgba(224, 176, 64, 0.12);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', Arial, sans-serif;
        background: transparent;
        padding: 20px;
        color: var(--text-1);
        -webkit-font-smoothing: antialiased;
      }

      body.standalone {
        background: var(--bg);
        background-image: var(--bg-gradient);
        min-height: 100vh;
        padding: 40px 32px;
      }

      /* ── Title ── */
      .site-title {
        display: none;
        margin-bottom: 36px;
      }

      body.standalone .site-title { display: block; }

      .site-title h1 {
        font-size: 30px;
        font-weight: 700;
        color: var(--text-1);
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .site-title p {
        font-size: 13px;
        color: var(--text-3);
        margin-top: 5px;
        letter-spacing: 0.01em;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: inline-flex;
        gap: 8px;
        margin-bottom: 24px;
        align-items: center;
        max-width: 100%;
      }

      .search-wrapper {
        position: relative;
        width: 396px;
        min-width: 120px;
        flex-shrink: 1;
      }

      .search-wrapper svg {
        position: absolute;
        left: 7px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-3);
        pointer-events: none;
      }

      .search-input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-1);
        font-family: inherit;
        font-size: 13px;
        padding: 9px 12px 9px 22px;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
        backdrop-filter: blur(12px);
      }

      .search-input::placeholder { color: #666680; }

      .search-input:focus {
        border-color: var(--accent-border);
        background: rgba(255,255,255,0.06);
      }

      .custom-select {
        position: relative;
      }

      .custom-select-trigger {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-2);
        font-family: inherit;
        font-size: 13px;
        padding: 9px 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.2s, color 0.2s;
        backdrop-filter: blur(12px);
        user-select: none;
      }

      .custom-select-trigger:hover,
      .custom-select.open .custom-select-trigger {
        border-color: var(--border-hover);
        color: var(--text-1);
      }

      .custom-select-trigger svg {
        opacity: 0.5;
        transition: transform 0.2s ease;
        flex-shrink: 0;
      }

      .custom-select.open .custom-select-trigger svg {
        transform: rotate(180deg);
      }

      .custom-select-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 100%;
        background: rgba(22, 22, 34, 0.97);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-hover);
        border-radius: 12px;
        padding: 4px;
        z-index: 50;
        box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        opacity: 0;
        transform: translateY(-6px) scale(0.97);
        pointer-events: none;
        transition: opacity 0.15s ease, transform 0.15s ease;
      }

      .custom-select.open .custom-select-menu {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
      }

      .custom-select-option {
        padding: 8px 12px;
        font-size: 13px;
        color: var(--text-2);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.1s, color 0.1s;
        white-space: nowrap;
      }

      .custom-select-option:hover {
        background: rgba(255,255,255,0.06);
        color: var(--text-1);
      }

      .custom-select-option.selected {
        color: var(--accent);
        background: var(--accent-subtle);
      }

      .results-count {
        font-size: 12px;
        color: var(--text-3);
        white-space: nowrap;
        padding: 0 4px;
        align-self: center;
        letter-spacing: 0.03em;
      }

      /* ── Grid ── */
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--surface);
        backdrop-filter: blur(16px);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.25s cubic-bezier(.22,.68,0,1.2), box-shadow 0.25s ease, border-color 0.2s ease;
        border: 1px solid var(--border);
        cursor: pointer;
        position: relative;
      }

      .card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
        pointer-events: none;
        z-index: 1;
      }

      .card:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,134,245,0.2), 0 0 30px rgba(124,134,245,0.06);
        border-color: rgba(124,134,245,0.25);
      }

      .poster-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 2/3;
        overflow: hidden;
        background: var(--surface-solid);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s cubic-bezier(.22,.68,0,1.2);
      }

      .card:hover img { transform: scale(1.06); }

      .rating-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(10, 10, 18, 0.85);
        backdrop-filter: blur(12px);
        color: var(--gold);
        font-size: 11px;
        font-weight: 600;
        padding: 4px 9px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 4px;
        letter-spacing: 0.02em;
        border: 1px solid rgba(224, 176, 64, 0.2);
      }

      .rating-badge.na { color: var(--text-3); border-color: transparent; }

      .card-body {
        padding: 12px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        position: relative;
        z-index: 2;
      }

      .card h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-1);
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 2.7em;
        letter-spacing: -0.01em;
      }

      .genre-tag {
        font-size: 11px;
        color: var(--text-2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: 0.01em;
      }

      .trailer-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        text-decoration: none;
        color: var(--accent);
        background: var(--accent-subtle);
        border: 1px solid var(--accent-border);
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        margin-top: auto;
        transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
      }

      .trailer-btn:hover {
        background: rgba(124, 134, 245, 0.18);
        border-color: rgba(124, 134, 245, 0.6);
        color: #a5aefc;
        box-shadow: none;
      }

      .trailer-btn svg { flex-shrink: 0; opacity: 0.85; }

      .no-results, .loading {
        color: var(--text-3);
        font-size: 14px;
        text-align: center;
        padding: 60px 20px;
        grid-column: 1 / -1;
      }

      /* ── Pagination ── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        margin-top: 36px;
      }

      .pagination button {
        background: var(--surface);
        backdrop-filter: blur(12px);
        color: var(--text-2);
        border: 1px solid var(--border);
        border-radius: 9px;
        width: 34px;
        height: 34px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .pagination button:hover:not(:disabled):not(.active) {
        border-color: var(--border-hover);
        color: var(--text-1);
        background: var(--surface-2);
      }

      .pagination button:disabled { opacity: 0.2; cursor: default; }

      .pagination button.active {
        background: var(--accent-subtle);
        border-color: var(--accent-border);
        color: var(--accent);
        font-weight: 600;
      }

      .pagination .dots {
        color: var(--text-3);
        font-size: 13px;
        width: 24px;
        text-align: center;
        line-height: 34px;
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(8, 8, 14, 0.8);
        backdrop-filter: blur(12px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }

      .modal-overlay.open { opacity: 1; pointer-events: all; }

      .modal {
        background: rgba(22, 22, 32, 0.95);
        backdrop-filter: blur(24px);
        border-radius: 20px;
        border: 1px solid var(--border);
        width: 100%;
        max-width: 820px;
        max-height: 90vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        transform: translateY(20px) scale(0.97);
        transition: transform 0.3s cubic-bezier(.22,.68,0,1.2);
        position: relative;
        box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      }

      .modal-overlay.open .modal { transform: translateY(0) scale(1); }

      .modal-header {
        position: relative;
        flex-shrink: 0;
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        height: 220px;
      }

      .modal-backdrop {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .modal-backdrop-placeholder {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1c1c28, #26263a);
      }

      .modal-backdrop-gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(8,8,14,0.05) 10%, rgba(22,22,32,0.98) 100%);
        pointer-events: none;
      }

      .modal-body {
        display: flex;
        gap: 24px;
        padding: 0 28px 28px;
        flex: 1;
      }

      .modal-poster {
        width: 130px;
        flex-shrink: 0;
        margin-top: -50px;
        position: relative;
        z-index: 1;
        align-self: flex-start;
      }

      .modal-poster img {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.12);
        display: block;
        box-shadow: 0 12px 36px rgba(0,0,0,0.7);
      }

      .modal-info {
        flex: 1;
        padding-top: 16px;
        min-width: 0;
      }

      .modal-title {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-1);
        line-height: 1.25;
        margin-bottom: 4px;
        letter-spacing: -0.02em;
      }

      .modal-tagline {
        font-size: 13px;
        color: var(--text-2);
        font-style: italic;
        margin-bottom: 14px;
        opacity: 0.75;
      }

      .modal-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 16px;
      }

      .meta-pill {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        color: var(--text-2);
        display: flex;
        align-items: center;
        gap: 5px;
        letter-spacing: 0.01em;
        backdrop-filter: blur(8px);
      }

      .meta-pill.rating {
        color: var(--gold);
        border-color: rgba(224, 176, 64, 0.25);
        background: var(--gold-subtle);
      }

      .modal-overview {
        font-size: 13px;
        color: var(--text-2);
        line-height: 1.75;
        margin-bottom: 22px;
      }

      .modal-trailer-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--text-1);
        background: var(--accent-subtle);
        border: 1px solid var(--accent-border);
        padding: 10px 22px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        letter-spacing: 0.01em;
      }

      .modal-trailer-btn:hover {
        background: rgba(124, 134, 245, 0.2);
        border-color: rgba(124, 134, 245, 0.6);
      }

      .modal-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(10, 10, 18, 0.75);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
        color: var(--text-2);
        border-radius: 50%;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: all 0.15s ease;
      }

      .modal-close:hover {
        color: var(--text-1);
        border-color: rgba(255,255,255,0.2);
        background: rgba(10, 10, 18, 0.95);
      }

      @media (max-width: 600px) {
        body { padding: 14px; }
        body.standalone { padding: 24px 16px; }

        .site-title h1 { font-size: 22px; }

        .toolbar {
          display: flex;
          flex-wrap: wrap;
          width: 100%;
        }

        .search-wrapper {
          flex-basis: 100%;
          width: 100%;
        }

        .sort-select { flex: 1; }

        .results-count { margin-left: auto; }

        .container {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 14px;
        }

        .pagination { flex-wrap: wrap; }

        .modal-overlay { padding: 0; align-items: flex-end; }

        .modal {
          border-radius: 18px 18px 0 0;
          max-height: 95vh;
          border-bottom: none;
        }

        .modal-header { height: 160px; }

        .modal-body {
          flex-direction: column;
          align-items: center;
          padding: 0 18px 24px;
          gap: 16px;
        }

        .modal-poster { margin-top: -40px; width: 90px; align-self: flex-start; }

        .modal-info { padding-top: 4px; width: 100%; }

        .modal-title { font-size: 17px; }

        .modal-tagline { font-size: 12px; }

        .modal-overview { font-size: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="site-title">
      <h1>Films en salle</h1>
      <p>Actualisé quotidiennement depuis TMDB</p>
    </div>

    <div class="toolbar">
      <div class="search-wrapper">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="search" type="text" placeholder="Rechercher un film…" autocomplete="off" />
      </div>
      <div class="custom-select" id="sort-select">
        <div class="custom-select-trigger" id="sort-trigger">
          <span id="sort-label">Ordre par défaut</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="custom-select-menu" id="sort-menu">
          <div class="custom-select-option selected" data-value="default">Ordre par défaut</div>
          <div class="custom-select-option" data-value="rating-desc">Note ↓</div>
          <div class="custom-select-option" data-value="rating-asc">Note ↑</div>
          <div class="custom-select-option" data-value="title-asc">Titre A → Z</div>
          <div class="custom-select-option" data-value="title-desc">Titre Z → A</div>
          <div class="custom-select-option" data-value="date-desc">Date récente</div>
          <div class="custom-select-option" data-value="date-asc">Date ancienne</div>
        </div>
      </div>
      <span class="results-count" id="count"></span>
    </div>

    <div class="container" id="movies">
      <div class="loading">Chargement des films…</div>
    </div>
    <div class="pagination" id="pagination"></div>

    <!-- Modal détail -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modal-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div id="modal-content"></div>
      </div>
    </div>

    <script>
      const PER_PAGE = 20;
      let currentPage = 1;
      let allMovies = [];
      let filtered = [];

      // ── Modal ──
      function openModal(movie) {
        const content = document.getElementById("modal-content");
        const ratingHTML = movie.rating && movie.rating > 0
          ? `<span class="meta-pill rating"><svg width="11" height="11" viewBox="0 0 24 24" fill="#f0c060"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${movie.rating.toFixed(1)}</span>`
          : `<span class="meta-pill">À venir</span>`;

        const runtimeHTML = movie.runtime
          ? `<span class="meta-pill"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${Math.floor(movie.runtime / 60)}h${String(movie.runtime % 60).padStart(2, "0")}</span>`
          : "";

        const dateHTML = movie.release_date
          ? `<span class="meta-pill">${new Date(movie.release_date).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" })}</span>`
          : "";

        const trailerHTML = movie.trailer
          ? `<a class="modal-trailer-btn" href="${movie.trailer}" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Voir la bande-annonce</a>`
          : "";

        const backdropHTML = movie.backdrop
          ? `<img class="modal-backdrop" src="${movie.backdrop}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"><div class="modal-backdrop-placeholder" style="display:none"></div>`
          : `<div class="modal-backdrop-placeholder"></div>`;

        content.innerHTML = `
          <div class="modal-header">
            ${backdropHTML}
            <div class="modal-backdrop-gradient"></div>
          </div>
          <div class="modal-body">
            <div class="modal-poster">
              <img src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://www.consultingmc.info/wp-content/uploads/2024/01/No-Image-Placeholder.svg_.png'">
            </div>
            <div class="modal-info">
              <div class="modal-title">${movie.title}</div>
              ${movie.tagline ? `<div class="modal-tagline">"${movie.tagline}"</div>` : ""}
              <div class="modal-meta">
                ${ratingHTML}
                ${runtimeHTML}
                ${dateHTML}
                <span class="meta-pill">${movie.genre}</span>
              </div>
              ${movie.overview ? `<div class="modal-overview">${movie.overview}</div>` : ""}
              ${trailerHTML}
            </div>
          </div>
        `;

        document.getElementById("modal-overlay").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      document.getElementById("modal-close").addEventListener("click", closeModal);
      document.getElementById("modal-overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal-overlay")) closeModal();
      });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

      // ── Filters ──
      function applyFilters() {
        const query = document.getElementById("search").value.trim().toLowerCase();
        const sort = currentSort;

        filtered = allMovies.filter(m =>
          !query || m.title.toLowerCase().includes(query) || m.genre.toLowerCase().includes(query)
        );

        filtered.sort((a, b) => {
          switch (sort) {
            case "rating-desc": return (b.rating || 0) - (a.rating || 0);
            case "rating-asc":  return (a.rating || 0) - (b.rating || 0);
            case "title-asc":   return a.title.localeCompare(b.title, "fr");
            case "title-desc":  return b.title.localeCompare(a.title, "fr");
            case "date-desc":   return (b.release_date || "").localeCompare(a.release_date || "");
            case "date-asc":    return (a.release_date || "").localeCompare(b.release_date || "");
            default: return 0;
          }
        });

        currentPage = 1;
        renderPage(currentPage);
      }

      // ── Render ──
      function renderPage(page) {
        const container = document.getElementById("movies");
        container.innerHTML = "";

        document.getElementById("count").textContent =
          filtered.length === allMovies.length
            ? `${allMovies.length} films`
            : `${filtered.length} / ${allMovies.length} films`;

        if (filtered.length === 0) {
          container.innerHTML = '<div class="no-results">Aucun film trouvé</div>';
          document.getElementById("pagination").innerHTML = "";
          return;
        }

        const start = (page - 1) * PER_PAGE;
        filtered.slice(start, start + PER_PAGE).forEach((movie) => {
          const card = document.createElement("div");
          card.classList.add("card");

          const roundedRating = movie.rating && movie.rating > 0 ? movie.rating.toFixed(1) : null;
          const ratingHTML = roundedRating
            ? `<span class="rating-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="#f0c060"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${roundedRating}</span>`
            : `<span class="rating-badge na">À venir</span>`;

          card.innerHTML = `
            <div class="poster-wrapper">
              <img src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://www.consultingmc.info/wp-content/uploads/2024/01/No-Image-Placeholder.svg_.png';">
              ${ratingHTML}
            </div>
            <div class="card-body">
              <h3>${movie.title}</h3>
              <span class="genre-tag">${movie.genre}</span>
              <a class="trailer-btn" href="${movie.trailer}" target="_blank" onclick="event.stopPropagation()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Bande-annonce
              </a>
            </div>
          `;

          card.addEventListener("click", () => openModal(movie));
          container.appendChild(card);
        });

        renderPagination(page);
      }

      function renderPagination(page) {
        const totalPages = Math.ceil(filtered.length / PER_PAGE);
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";
        if (totalPages <= 1) return;

        const goTo = (p) => { currentPage = p; renderPage(p); window.scrollTo({ top: 0, behavior: "smooth" }); };
        const btn = (label, p, disabled = false, active = false) => {
          const b = document.createElement("button");
          b.innerHTML = label;
          if (active) b.classList.add("active");
          if (disabled) b.disabled = true;
          b.addEventListener("click", () => { if (!disabled) goTo(p); });
          return b;
        };
        const dots = () => { const s = document.createElement("span"); s.className = "dots"; s.textContent = "…"; return s; };

        pagination.appendChild(btn("&#8592;", page - 1, page === 1));
        const visible = new Set([1, totalPages, page - 1, page, page + 1].filter(p => p >= 1 && p <= totalPages));
        let prev = 0;
        [...visible].sort((a, b) => a - b).forEach(p => {
          if (p - prev > 1) pagination.appendChild(dots());
          pagination.appendChild(btn(p, p, false, p === page));
          prev = p;
        });
        pagination.appendChild(btn("&#8594;", page + 1, page === totalPages));
      }

      if (window.self === window.top) document.body.classList.add("standalone");

      // ── Custom select ──
      let currentSort = "default";
      const sortSelect = document.getElementById("sort-select");
      const sortTrigger = document.getElementById("sort-trigger");
      const sortMenu = document.getElementById("sort-menu");
      const sortLabel = document.getElementById("sort-label");

      sortTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        sortSelect.classList.toggle("open");
      });

      sortMenu.querySelectorAll(".custom-select-option").forEach(opt => {
        opt.addEventListener("click", () => {
          sortMenu.querySelectorAll(".custom-select-option").forEach(o => o.classList.remove("selected"));
          opt.classList.add("selected");
          currentSort = opt.dataset.value;
          sortLabel.textContent = opt.textContent;
          sortSelect.classList.remove("open");
          applyFilters();
        });
      });

      document.addEventListener("click", () => sortSelect.classList.remove("open"));

      document.getElementById("search").addEventListener("input", applyFilters);

      fetch("movies.json")
        .then((r) => r.json())
        .then((movies) => {
          allMovies = movies;
          filtered = [...movies];
          renderPage(currentPage);
          document.getElementById("count").textContent = `${movies.length} films`;
        })
        .catch(() => {
          document.getElementById("movies").innerHTML = '<div class="loading">Impossible de charger les films.</div>';
        });
    </script>
  </body>
</html>
