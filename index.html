<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Films en salle</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="site-title">
      <h1>Films en salle</h1>
      <p>Actualisé quotidiennement depuis TMDB</p>
    </div>

    <div class="toolbar">
      <div class="search-wrapper">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="search" type="text" placeholder="Rechercher un film…" autocomplete="off" />
      </div>
      <div class="custom-select" id="sort-select">
        <div class="custom-select-trigger" id="sort-trigger">
          <span id="sort-label">Ordre par défaut</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="custom-select-menu" id="sort-menu">
          <div class="custom-select-option selected" data-value="default">Ordre par défaut</div>
          <div class="custom-select-option" data-value="rating-desc">Note ↓</div>
          <div class="custom-select-option" data-value="rating-asc">Note ↑</div>
          <div class="custom-select-option" data-value="title-asc">Titre A → Z</div>
          <div class="custom-select-option" data-value="title-desc">Titre Z → A</div>
          <div class="custom-select-option" data-value="date-desc">Date récente</div>
          <div class="custom-select-option" data-value="date-asc">Date ancienne</div>
        </div>
      </div>
      <div class="custom-select" id="genre-select">
        <div class="custom-select-trigger" id="genre-trigger">
          <span id="genre-label">Tous les genres</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="custom-select-menu" id="genre-menu">
          <div class="custom-select-option selected" data-value="">Tous les genres</div>
        </div>
      </div>
      <span class="results-count" id="count"></span>
    </div>

    <div class="container" id="movies">
      <div class="loading">Chargement des films…</div>
    </div>
    <div class="pagination" id="pagination"></div>

    <!-- Modal détail -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modal-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="modal-scroll" id="modal-content"></div>
      </div>
    </div>

    <script src="modal.js"></script>
    <script src="app.js"></script>
  </body>
</html>
